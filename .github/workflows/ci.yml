name: CI/CD Pipeline - SRE LLM Assistant

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-deployment:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. КРИТИЧЕСКИ ВАЖНО: Настройка ядра Linux для OpenSearch
      # Без этого шага OpenSearch упадет с bootstrap checks failed еще до старта
      - name: Configure kernel parameters for OpenSearch
        run: |
          sudo sysctl -w vm.max_map_count=262144
          echo "✅ vm.max_map_count set to $(sysctl vm.max_map_count)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install test dependencies
        run: pip install httpx

      # 2. ЕДИНЫЙ ЗАПУСК ВСЕЙ ИНФРАСТРУКТУРЫ
      # --wait дожидается прохождения всех healthcheck'ов из docker-compose.yml
      # --abort-on-container-exit останавливает всё, если какой-то сервис упал
      - name: Start infrastructure via Docker Compose
        run: |
          echo "Building and starting all services..."
          docker compose up -d --build --wait --abort-on-container-exit
          
          echo "✅ All containers are healthy and ready"
          docker compose ps

      # 3. ПРОВЕРКИ И ТЕСТИРОВАНИЕ
      # Инфраструктура уже гарантированно готова благодаря --wait выше
      
      - name: Seed logs into OpenSearch
        run: python scripts/seed_logs.py

      - name: Test API endpoint
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/v1/analyze \
            -H "Content-Type: application/json" \
            -d '{"hours": 0.1}')
          
          echo "API Response: $RESPONSE"
          
          LOGS_COUNT=$(echo "$RESPONSE" | python -c "import sys, json; print(json.load(sys.stdin).get('logs_analyzed', 0))")
          
          if [ "$LOGS_COUNT" -gt 0 ]; then
            echo "✅ Success: API analyzed $LOGS_COUNT logs"
          else
            echo "❌ Failed: logs_analyzed is 0 or missing"
            exit 1
          fi

      # 4. ОЧИСТКА (всегда выполняется, даже при падении тестов)
      - name: Cleanup infrastructure
        if: always()
        run: |
          echo "Stopping and removing all containers and volumes..."
          docker compose down -v
          echo "✅ Cleanup completed"
