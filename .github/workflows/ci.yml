name: CI/CD Pipeline - SRE LLM Assistant

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-deployment:
    runs-on: ubuntu-latest
    
    # Ограничиваем ресурсы, чтобы не убить раннер
    env:
      JAVA_OPTS: "-Xms128m -Xmx128m" 

    steps:
      - uses: actions/checkout@v4

      # 1. КРИТИЧЕСКИ ВАЖНО: Настройка ядра Linux для OpenSearch
      # Без этого OpenSearch падает с bootstrap checks failed
      - name: Configure kernel parameters
        run: |
          sudo sysctl -w vm.max_map_count=262144
          echo "vm.max_map_count set to $(sysctl vm.max_map_count)"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx

      - name: Build sre-api image
        run: docker build -t sre-api:latest -f Dockerfile.dev .

      - name: Create shared network
        run: docker network create sre-net

      # 2. Запуск OpenSearch (исправленная версия)
      # Используем JVM-flag для отключения security, чтобы избежать зависания на генерации сертификатов
      - name: Start OpenSearch
        run: |
          docker run -d \
            --name opensearch \
            --network sre-net \
            -p 9200:9200 \
            --ulimit memlock=-1:-1 \
            --ulimit nofile=65536:65536 \
            -e "bootstrap.memory_lock=false" \
            -e "ES_JAVA_OPTS=-Xms256m -Xmx256m -Dopensearch_security.disabled=true" \
            -e "discovery.type=single-node" \
            -e "cluster.initial_master_nodes=os-node-1" \
            -e "discovery.seed_hosts=127.0.0.1" \
            opensearchproject/opensearch:2.12.0

      - name: Wait for OpenSearch
      - run: |
          python3 -c "
          import time, urllib.request
          start = time.time()
          while time.time() - start < 300:
              try:
                  resp = urllib.request.urlopen('http://127.0.0.1:9200/_cluster/health', timeout=5)
                  if resp.status == 200:
                      print('✅ OpenSearch is ready')
                      exit(0)
              except:
                  pass
              print(f'⏳ Waiting... ({int(time.time()-start)}s)')
              time.sleep(5)
          print('❌ Timeout waiting for OpenSearch')
          exit(1)
          "

      # 3. Запуск Ollama с ПРЕДЗАГРУЗКОЙ модели
      # Модель скачивается внутри контейнера при старте, не нужен отдельный шаг docker exec
      - name: Start Ollama
        run: |
          docker run -d \
            --name ollama \
            --network sre-net \
            -p 11434:11434 \
            -v ollama-data:/root/.ollama \
            -e OLLAMA_KEEP_ALIVE=-1 \
            ollama/ollama:0.5.7 ollama run tinyllama ""

      - name: Wait for Ollama & Model
        run: |
          echo "Waiting for Ollama and tinyllama model..."
          timeout 180 bash -c 'until docker exec ollama ollama list | grep -q tinyllama; do sleep 5; done'
          echo "✅ Ollama with tinyllama is ready"

      # 4. Запуск API
      # Используем имена сервисов в сети sre-net, а не host.docker.internal
      - name: Start sre-api
        run: |
          docker run -d \
            --name sre-api \
            --network sre-net \
            -p 8000:8000 \
            -e ES_HOST=http://opensearch:9200 \
            -e OLLAMA_HOST=http://ollama:11434 \
            sre-api:latest

      - name: Wait for sre-api
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8000/health; do sleep 3; done'
          echo "✅ SRE API is ready"

      # 5. Тесты
      - name: Seed logs into OpenSearch
        run: python scripts/seed_logs.py

      - name: Test API endpoint
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/v1/analyze \
            -H "Content-Type: application/json" \
            -d '{"hours": 0.1}')
          
          echo "Response: $RESPONSE"
          
          LOGS_COUNT=$(echo "$RESPONSE" | python -c "import sys, json; print(json.load(sys.stdin).get('logs_analyzed', 0))")
          
          if [ "$LOGS_COUNT" -gt 0 ]; then
            echo "✅ Success: API analyzed $LOGS_COUNT logs"
          else
            echo "❌ Failed: logs_analyzed is 0 or missing"
            exit 1
          fi

      # 6. Очистка (всегда выполняется)
      - name: Cleanup
        if: always()
        run: |
          docker stop sre-api ollama opensearch || true
          docker rm sre-api ollama opensearch || true
          docker network rm sre-net || true
          docker volume rm ollama-data || true
