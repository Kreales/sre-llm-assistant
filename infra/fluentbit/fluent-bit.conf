[SERVICE]
    Flush        5
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name         tail
    Path         /var/log/syslog,/var/log/*.log
    Parser       syslog
    Tag          host.*
    Refresh_Interval 5

[INPUT]
    Name         dummy
    Tag          app.synthetic
    Dummy        {"@timestamp":"${NOW}","level":"ERROR","service":"auth-api","pod":"auth-7d4f8b-x9k2","message":"Connection pool exhausted"}
    Rate         1

[FILTER]
    Name         parser
    Match        app.*
    Key_Name     message
    Parser       json
    Reserve_Data On

[OUTPUT]
    Name            opensearch
    Match           *
    Host            opensearch
    Port            9200
    Index           sre-logs
    Logstash_Format On
    Logstash_Prefix sre-logs
    Logstash_DateFormat %Y.%m.%d
    Replace_Dots    On
    Retry_Limit     3
    Suppress_Type_Name On
    Type            _doc
